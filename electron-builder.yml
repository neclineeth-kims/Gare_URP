# electron-builder configuration for Unit Rate App
# Build with: npm run electron:build:linux  (or :win)

appId: com.unitrate.app
productName: Unit Rate App

# Use ASAR for packaging (smaller installer, faster startup).
# The Prisma engine binary is unpacked from the ASAR so it can be executed.
# The generated .prisma/client files are copied via extraResources so they
# land on the real filesystem (electron/main.ts hooks Module._resolveFilename
# to redirect require('.prisma/client/...') to that location).
asar: true

asarUnpack:
  - "node_modules/@prisma/engines/**"
  - "node_modules/better-sqlite3/**"

directories:
  output: dist-electron        # packaged output goes here
  buildResources: electron/assets

# ── Extra resources (placed in resources/ folder next to app.asar) ─────────────
extraResources:
  # Pre-seeded SQLite template — copied to userData on first launch
  - from: electron/assets/template.db
    to: template.db
  # Generated Prisma client — required by Next.js server at runtime.
  # We copy it outside app.asar because require('.prisma/client/default')
  # can't be reliably resolved from inside the ASAR virtual filesystem.
  - from: node_modules/.prisma/client
    to: prisma-client

# ── Files to include in the package ─────────────────────────────────────────
files:
  - "**/*"
  # Exclude secrets and dev-only files
  - "!.env*"
  - "!**/.env*"
  # Exclude dev databases and seeds
  - "!prisma/desktop.db"
  - "!prisma/seed*.ts"
  - "!prisma/migrations/**"
  # Exclude unnecessary large directories
  - "!**/node_modules/.cache/**"
  - "!**/scripts/**"
  - "!**/*.md"
  - "!dist-electron/**"
  - "!electron/assets/**"

# ── Linux build ───────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
  description: "Offline unit rate analysis for construction cost engineering"
  icon: electron/assets/icon.png  # 512×512 PNG (create before building)

# ── Windows build ─────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.ico  # 256×256 ICO (create before building)

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ── Extra metadata ────────────────────────────────────────────────────────────
copyright: "Copyright © 2026"
