# electron-builder configuration for Unit Rate App
# Build with: npm run electron:build:linux  (or :win)

appId: com.unitrate.app
productName: Unit Rate App

# Disable ASAR so all files are regular files on disk.
# This avoids glob-matching issues with dot-directories like .prisma/client
# and eliminates all native .node module loading restrictions.
asar: false

directories:
  output: dist-electron        # packaged output goes here
  buildResources: electron/assets

# Bundle the pre-seeded SQLite template so first-launch works offline
extraResources:
  - from: electron/assets/template.db
    to: template.db

# ── Files to include in the package ─────────────────────────────────────────
files:
  - "**/*"
  # Exclude secrets and dev-only files
  - "!.env*"
  - "!**/.env*"
  # Exclude dev databases and seeds
  - "!prisma/desktop.db"
  - "!prisma/seed*.ts"
  - "!prisma/migrations/**"
  # Exclude unnecessary large directories
  - "!**/node_modules/.cache/**"
  - "!**/scripts/**"
  - "!**/*.md"
  - "!dist-electron/**"
  - "!electron/assets/**"

# ── Linux build ───────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
  description: "Offline unit rate analysis for construction cost engineering"
  icon: electron/assets/icon.png  # 512×512 PNG (create before building)

# ── Windows build ─────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.ico  # 256×256 ICO (create before building)

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ── Extra metadata ────────────────────────────────────────────────────────────
copyright: "Copyright © 2026"
